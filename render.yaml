services:
  - type: web
    name: kommunalka-api
    runtime: python
    region: frankfurt
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGO_URL
        sync: false          # Задать вручную в Render dashboard
      - key: DB_NAME
        value: kommunalka
      - key: API_KEY
        sync: false          # Обязательно! Без него API открыт для всех
      - key: BUDGET_USER1_NAME
        sync: false          # Имя первого пользователя бюджета (например: Иван)
      - key: BUDGET_USER1_HASH
        sync: false          # SHA-256 хеш PIN первого пользователя
      - key: BUDGET_USER2_NAME
        sync: false          # Имя второго пользователя бюджета (например: Мария)
      - key: BUDGET_USER2_HASH
        sync: false          # SHA-256 хеш PIN второго пользователя
    healthCheckPath: /health
